name: Build PlusOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin grub-common xorriso

      - name: Prepare ISO
        run: |
          mkdir -p iso/boot/grub
          cp build/os.bin iso/boot/os.bin
          cp grub.cfg iso/boot/grub/grub.cfg

      - name: Build ISO
        run: |
          grub-mkrescue -o plusos.iso iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PlusOS-ISO
          path: plusos.iso
