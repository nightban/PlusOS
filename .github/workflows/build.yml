name: Build PlusOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin grub-common xorriso nasm gcc

      # 👇 ВОТ ЭТОГО У ТЕБЯ НЕ ХВАТАЛО
      - name: Build kernel
        run: |
          mkdir -p build
          nasm -f elf32 boot/boot.asm -o build/boot.o
          gcc -m32 -ffreestanding -c kernel/kernel.c -o build/kernel.o
          gcc -m32 -ffreestanding -c kernel/screen.c -o build/screen.o
          gcc -m32 -ffreestanding -c kernel/keyboard.c -o build/keyboard.o
          ld -m elf_i386 -T linker.ld -o build/os.bin build/boot.o build/kernel.o build/screen.o build/keyboard.o

      - name: Prepare ISO
        run: |
          mkdir -p iso/boot/grub
          cp build/os.bin iso/boot/os.bin
          cp grub.cfg iso/boot/grub/grub.cfg

      - name: Build ISO
        run: |
          grub-mkrescue -o plusos.iso iso/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PlusOS-ISO
          path: plusos.iso
