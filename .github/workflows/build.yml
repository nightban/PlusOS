name: Build PlusOS

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nasm gcc-multilib make binutils

      - name: Debug structure
        run: ls -R

      # 👉 сборка версии Lite (если папка есть)
      - name: Build PlusOS Lite
        run: |
          if [ -d "PlusOS Lite" ]; then
            cd "PlusOS Lite"
            make
          else
            echo "❌ Folder PlusOS Lite not found"
            ls -R
            exit 1
          fi

      # 👉 если хочешь, можешь добавить другие версии:
      # - name: Build PlusOS Pro
      #   run: |
      #     if [ -d "PlusOS Pro" ]; then
      #       cd "PlusOS Pro"
      #       make
      #     fi
