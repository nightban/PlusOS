name: Build PlusOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Забираем код
      - name: Checkout
        uses: actions/checkout@v4

      # 📦 Ставим ВСЕ нужные зависимости
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            grub-pc-bin \
            grub-common \
            xorriso \
            nasm \
            gcc \
            gcc-multilib \
            mtools

      # 🔨 Сборка ядра
      - name: Build kernel
        run: |
          cd "PlusOS Lite"
          mkdir -p build

          nasm -f elf32 boot/boot.asm -o build/boot.o
          gcc -m32 -ffreestanding -c kernel/kernel.c -o build/kernel.o
          gcc -m32 -ffreestanding -c kernel/screen.c -o build/screen.o
          gcc -m32 -ffreestanding -c kernel/keyboard.c -o build/keyboard.o

          ld -m elf_i386 -T linker.ld -o build/os.bin \
            build/boot.o build/kernel.o build/screen.o build/keyboard.o

      # 📁 Создание ISO структуры
      - name: Prepare ISO
        run: |
          cd "PlusOS Lite"
          mkdir -p iso/boot/grub

          cp build/os.bin iso/boot/os.bin
          cp grub.cfg iso/boot/grub/grub.cfg

      # 💿 Сборка ISO
      - name: Build ISO
        run: |
          cd "PlusOS Lite"
          grub-mkrescue -o plusos.iso iso/

      # 📤 Загрузка результата
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: PlusOS-ISO
          path: PlusOS Lite/plusos.iso
