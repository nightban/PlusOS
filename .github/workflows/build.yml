name: Build PlusOS Lite

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nasm gcc-multilib make ld

      - name: Build OS
        run: make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlusOS-Lite
          path: build/
